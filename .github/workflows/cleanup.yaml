# Cleanup old generated docs previews

name: Cleanup

on:
  schedule:
    # 06:50 UTC every Monday
    - cron: '50 6 * * 1'
  workflow_dispatch:

concurrency:
  group: cleanup-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clean_docs_branch:
    timeout-minutes: 45
    permissions:
      issues: write
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: generated-docs-preview

      - name: Clean docs branch
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          cd pr/
          # keep the last 10 prs
          mapfile -t dirs < <(ls -1d [0-9]* 2>/dev/null | sort -n)
          if [ "${#dirs[@]}" -le 10 ]; then
            echo "only ${#dirs[@]} PR dirs, nothing to prune"
            exit 0
          fi
          printf '%s\n' "${dirs[@]:0:${#dirs[@]}-10}" | xargs rm -rf

          git add -A .
          if git diff --cached --quiet; then
            echo "nothing staged, branch already clean"
            exit 0
          fi
          git commit -m "Cleanup old docs"
          git push
